<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>策略设置</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="prefetch" href="/chat.html" as="document">
</head>
<body>
  <main class="strategy-shell">
    <!-- 左栏：策略列表 -->
    <aside class="strategy-history">
      <div class="strategy-page-head">
        <a class="back-link" href="/">返回回测</a>
        <h1>策略库</h1>
      </div>
      <div id="strategyList" class="history-list"></div>
      <button id="newStrategyBtn" class="new-strategy-btn" type="button">新建策略</button>
    </aside>

    <!-- 中栏：策略详情 + Agent 面板 -->
    <section class="strategy-detail">
      <header class="strategy-detail-head">
        <div>
          <div id="detailTitle" class="detail-title"></div>
          <div id="detailDesc" class="detail-desc"></div>
        </div>
        <button id="useStrategyButton" class="primary compact-button" type="button">应用策略</button>
      </header>

      <section class="detail-metrics">
        <article>
          <span>收益</span>
          <strong id="detailReturn"></strong>
        </article>
        <article>
          <span>胜率</span>
          <strong id="detailWinRate"></strong>
        </article>
        <article>
          <span>策略类型</span>
          <strong id="detailType"></strong>
        </article>
        <article>
          <span>年份</span>
          <strong id="detailYears"></strong>
        </article>
      </section>

      <!-- 策略规则 + Agent 面板 -->
      <div class="strategy-preview-area">
        <section class="rule-canvas" id="ruleCanvas"></section>
        <div id="filePreview" class="file-preview">
          <div class="file-preview-head">
            <span id="filePreviewName">Agent 面板</span>
            <button id="filePreviewClose" type="button" class="fp-close-btn">&times;</button>
          </div>
          <div class="file-preview-hint" id="filePreviewHint">Agent 的文件预览、权限确认和运行提示会显示在这里</div>
          <pre id="filePreviewContent" class="file-preview-body"></pre>
          <div class="approval-actions" id="approvalActions" hidden>
            <button id="approvalRejectButton" class="approval-button reject" type="button">拒绝</button>
            <button id="approvalApproveButton" class="approval-button approve" type="button">同意</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 右栏：Agent 接入 -->
    <aside class="agent-shell">
      <div class="agent-card">
        <div class="agent-card-head">
          <span class="agent-title">策略生成 Agent</span>
          <span class="agent-status disconnected" id="agentStatus">未连接</span>
        </div>
        <iframe id="chatFrame" src="/chat.html" class="agent-card-frame"
                sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
      </div>
    </aside>
  </main>

  <script src="/strategy-data.js"></script>
  <script src="/strategy.js"></script>
  <!-- Agent 桥接 -->
  <script>
    // 当前选中的策略 ID，传递给 Agent 作为对话上下文
    const STRATEGY_AGENT_SESSION_KEY = "ai_backtester_agent_strategy_sessions";
    let currentStrategyId = null;
    let currentApprovalRequest = null;

    window.addEventListener("message", (event) => {
      if (event.origin !== window.location.origin) return;
      const msg = event.data;
      if (msg?.type === "preview-file" || msg?.type === "agent:file-preview") {
        // 在中栏浮动窗口显示文件内容。Agent 只暴露数据，预览 UI 由父页面接管。
        showFilePreview(msg.name || msg.fileName || "file", msg.content || msg.after || "");
        // Agent 生成文件后标记当前策略为有效
        if (currentStrategyId && typeof markStrategyFileGenerated === "function") {
          const targetId = strategyGenerationTargetId();
          const strategy = markStrategyFileGenerated(targetId, {
            name: msg.name || msg.fileName,
            fileName: msg.fileName || msg.name,
            path: msg.path,
            content: msg.content || msg.after || "",
          });
          refreshStrategyListAfterGenerated(strategy?.id || targetId);
        }
      }
      if (msg?.type === "strategy-created") {
        if (typeof registerGeneratedStrategy === "function") {
          const targetId = strategyGenerationTargetId();
          const strategy = registerGeneratedStrategy({
            id: targetId,
            name: msg.name,
            path: msg.path,
          }, targetId);
          refreshStrategyListAfterGenerated(strategy.id);
        }
      }
      if (msg?.type === "agent:approval-request") {
        showApprovalRequest(msg);
      }
      if (msg?.type === "agent:approval-resolved") {
        if (!currentApprovalRequest || currentApprovalRequest.request_id === msg.request_id) {
          currentApprovalRequest = null;
          hideApprovalActions();
        }
      }
      if (msg?.type === "agent:notice") {
        showAgentNotice(msg);
      }
      if (msg?.type === "agent:file-previews") {
        window.latestAgentFilePreviews = Array.isArray(msg.items) ? msg.items : [];
      }
      if (msg?.type === "agent:strategy-session-bound") {
        rememberStrategyAgentWorkspace(msg.strategyId || currentStrategyId, msg.workspace || "");
      }
      if (msg?.type === "agent:state") {
        if (msg.status) updateAgentStatus(msg.status);
        if (msg.strategyId && msg.workspace) {
          rememberStrategyAgentWorkspace(msg.strategyId, msg.workspace);
        }
        window.latestAgentState = msg;
      }
      if (msg?.type === "agent-status") {
        updateAgentStatus(msg.status || "disconnected");
      }
    });

    function strategyAgentSessionBindings() {
      try {
        const raw = JSON.parse(localStorage.getItem(STRATEGY_AGENT_SESSION_KEY) || "{}");
        return raw && typeof raw === "object" ? raw : {};
      } catch {
        return {};
      }
    }

    function rememberStrategyAgentWorkspace(strategyId, workspace) {
      if (!strategyId || !workspace) return;
      const bindings = strategyAgentSessionBindings();
      bindings[strategyId] = workspace;
      localStorage.setItem(STRATEGY_AGENT_SESSION_KEY, JSON.stringify(bindings));
    }

    function boundAgentWorkspace(strategyId) {
      if (!strategyId) return "";
      return String(strategyAgentSessionBindings()[strategyId] || "");
    }

    function refreshStrategyListAfterGenerated(strategyId) {
      if (typeof pageState === "undefined") return;
      if (strategyId) {
        pageState.selected = findStrategy(strategyId);
        if (typeof saveSelectedStrategy === "function") {
          saveSelectedStrategy(strategyId);
        }
      }
      if (typeof renderList === "function") renderList();
      if (typeof renderDetail === "function") renderDetail(pageState.selected);
    }

    function strategyGenerationTargetId() {
      if (!currentStrategyId) return "";
      if (String(currentStrategyId).startsWith("new-")) return currentStrategyId;
      if (typeof loadUserStrategies === "function") {
        const saved = loadUserStrategies();
        if (saved.some(item => item.id === currentStrategyId)) return currentStrategyId;
      }
      return "";
    }

    function showFilePreview(name, content) {
      const el = document.getElementById("filePreview");
      const nameEl = document.getElementById("filePreviewName");
      const contentEl = document.getElementById("filePreviewContent");
      const hintEl = document.getElementById("filePreviewHint");
      if (!el || !nameEl || !contentEl) return;
      hideApprovalActions();
      nameEl.textContent = "Agent_strategy/" + name;
      contentEl.textContent = content || "";
      if (hintEl) hintEl.hidden = true;
      el.classList.add("open");
    }

    function showAgentNotice(notice) {
      const el = document.getElementById("filePreview");
      const nameEl = document.getElementById("filePreviewName");
      const contentEl = document.getElementById("filePreviewContent");
      const hintEl = document.getElementById("filePreviewHint");
      if (!el || !nameEl || !contentEl) return;
      hideApprovalActions();
      nameEl.textContent = notice.title || "Agent 提示";
      contentEl.textContent = notice.content || notice.body || "";
      if (hintEl) hintEl.hidden = true;
      el.classList.add("open");
    }

    function showApprovalRequest(request) {
      const el = document.getElementById("filePreview");
      const nameEl = document.getElementById("filePreviewName");
      const contentEl = document.getElementById("filePreviewContent");
      const hintEl = document.getElementById("filePreviewHint");
      const actionsEl = document.getElementById("approvalActions");
      if (!el || !nameEl || !contentEl || !actionsEl) return;
      currentApprovalRequest = {
        request_id: request.request_id || request.requestId || "",
        toolName: request.toolName || request.tool_name || "BashTool",
        command: request.command || "",
        riskReason: request.riskReason || request.risk_reason || "",
      };
      nameEl.textContent = "权限确认 · " + currentApprovalRequest.toolName;
      contentEl.textContent = [
        "工具：" + currentApprovalRequest.toolName,
        "",
        "操作：",
        currentApprovalRequest.command || "—",
        "",
        "原因：",
        currentApprovalRequest.riskReason || "—",
      ].join("\n");
      if (hintEl) hintEl.hidden = true;
      actionsEl.hidden = false;
      el.classList.add("open");
    }

    function hideFilePreview() {
      const el = document.getElementById("filePreview");
      const nameEl = document.getElementById("filePreviewName");
      const contentEl = document.getElementById("filePreviewContent");
      const hintEl = document.getElementById("filePreviewHint");
      if (el) el.classList.remove("open");
      if (nameEl) nameEl.textContent = "Agent 面板";
      if (contentEl) contentEl.textContent = "";
      if (hintEl) hintEl.hidden = false;
      hideApprovalActions();
    }

    function hideApprovalActions() {
      const actionsEl = document.getElementById("approvalActions");
      if (actionsEl) actionsEl.hidden = true;
    }

    function sendApprovalDecision(approved) {
      if (!currentApprovalRequest) return;
      const frame = document.getElementById("chatFrame");
      if (frame?.contentWindow) {
        frame.contentWindow.postMessage({
          type: "agent:approval",
          request_id: currentApprovalRequest.request_id,
          approved: Boolean(approved),
          reason: approved ? "" : "用户拒绝",
        }, window.location.origin);
      }
      currentApprovalRequest = null;
      hideFilePreview();
    }

    // 点击关闭按钮或遮罩关闭
    document.getElementById("filePreviewClose")?.addEventListener("click", hideFilePreview);
    document.getElementById("approvalApproveButton")?.addEventListener("click", () => sendApprovalDecision(true));
    document.getElementById("approvalRejectButton")?.addEventListener("click", () => sendApprovalDecision(false));

    function updateAgentStatus(status) {
      const badge = document.getElementById("agentStatus");
      if (!badge) return;
      badge.textContent = status === "connected" ? "已连接" : status === "running" ? "运行中" : "未连接";
      badge.className = "agent-status " + status;
    }

    // 发送策略上下文到 Agent iframe
    function sendStrategyToAgent(strategyId, strategyName) {
      currentStrategyId = strategyId;
      const workspace = boundAgentWorkspace(strategyId);
      const frame = document.getElementById("chatFrame");
      if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage({
          type: "set-strategy",
          strategyId: strategyId,
          strategyName: strategyName,
          workspace: workspace,
        }, window.location.origin);
        frame.contentWindow.postMessage({ type: "agent:get-file-previews" }, window.location.origin);
      }
    }

    document.getElementById("chatFrame")?.addEventListener("load", () => {
      const frame = document.getElementById("chatFrame");
      if (!frame?.contentWindow) return;
      const selectedStrategy = typeof pageState !== "undefined" && pageState.selected
        ? pageState.selected
        : (typeof loadSelectedStrategy === "function" ? loadSelectedStrategy() : null);
      if (selectedStrategy) {
        sendStrategyToAgent(selectedStrategy.id, selectedStrategy.title);
      }
      frame.contentWindow.postMessage({ type: "agent:get-state" }, window.location.origin);
      frame.contentWindow.postMessage({ type: "agent:get-file-previews" }, window.location.origin);
    });
  </script>
</body>
</html>
