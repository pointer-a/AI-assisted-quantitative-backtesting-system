function closeUserInputModal() {
  userInputModal.classList.remove('open');
  state.userInputPending = null;
}

function normalizeUserInputItems(data) {
  const source = Array.isArray(data.questions) ? data.questions : Array.isArray(data.items) ? data.items : null;
  if (source && source.length) {
    return source.map((item) => normalizeUserInputItem(item, data)).filter((item) => item.question);
  }
  return [normalizeUserInputItem(data, data)].filter((item) => item.question);
}

function normalizeUserInputItem(item, root) {
  if (typeof item === 'string') {
    return parseUserInputQuestion({
      question: item,
      context: root.context || '',
      default: root.default || '',
      options: root.options || root.choices || [],
    });
  }
  return parseUserInputQuestion({
    question: item.question || item.prompt || item.title || '',
    context: item.context || root.context || '',
    default: item.default || item.value || '',
    options: item.options || item.choices || item.values || [],
  });
}

function parseUserInputQuestion(item) {
  const explicitOptions = normalizeChoiceOptions(item.options);
  if (explicitOptions.length) {
    return {
      question: String(item.question || '').trim(),
      context: String(item.context || '').trim(),
      default: String(item.default || ''),
      options: explicitOptions,
    };
  }

  const parsed = parseEmbeddedOptions(String(item.question || ''));
  return {
    question: parsed.question,
    context: String(item.context || '').trim(),
    default: String(item.default || ''),
    options: parsed.options,
  };
}

function normalizeChoiceOptions(options) {
  if (!Array.isArray(options)) return [];
  return options
    .map((option) => {
      if (option && typeof option === 'object') {
        const label = option.label || option.name || option.title || option.value || '';
        const value = option.value || label;
        return { label: String(label).trim(), value: String(value).trim() };
      }
      const text = String(option || '').trim();
      return { label: text, value: text };
    })
    .filter((option) => option.label);
}

function parseEmbeddedOptions(text) {
  const lines = String(text || '').split(/\r?\n/).map((line) => line.trim()).filter(Boolean);
  const options = [];
  const questionLines = [];
  for (const line of lines) {
    const match = line.match(/^(?:[-*•]\s+|\d+[.)、]\s*|[A-Ha-h][.)、:：]\s*)(.+)$/);
    if (match) {
      options.push({ label: match[1].trim(), value: match[1].trim() });
    } else {
      questionLines.push(line.replace(/^选项[:：]\s*/, '').trim());
    }
  }
  if (options.length >= 2 && questionLines.length) {
    return { question: questionLines.join('\n'), options };
  }
  return { question: text.trim(), options: [] };
}

function renderUserInputStep() {
  if (!state.userInputPending) return;
  const pending = state.userInputPending;
  const item = pending.items[pending.index] || { question: '', context: '', default: '', options: [] };
  const total = pending.items.length;
  const questionEl = document.getElementById('user-input-question');
  const contextEl = document.getElementById('user-input-context');
  const stepEl = document.getElementById('user-input-step');
  const answerEl = document.getElementById('user-input-answer');
  const answerField = document.getElementById('user-input-answer-field');
  const optionsField = document.getElementById('user-input-options-field');
  const optionsEl = document.getElementById('user-input-options');
  const submitBtn = document.getElementById('btn-user-submit');

  pending.customMode = false;
  questionEl.textContent = item.question || '';
  contextEl.textContent = item.context || '无';
  stepEl.textContent = total > 1 ? `${pending.index + 1} / ${total}` : '';
  answerEl.value = item.default || '';

  const choices = Array.isArray(item.options) ? item.options : [];
  optionsEl.innerHTML = '';
  if (choices.length) {
    const allChoices = [...choices, { label: '用户自行补充', value: '__custom__', custom: true }];
    for (const choice of allChoices) {
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'choice-button';
      button.textContent = choice.label;
      button.addEventListener('click', () => {
        if (choice.custom) {
          pending.customMode = true;
          answerField.hidden = false;
          submitBtn.hidden = false;
          answerEl.value = '';
          answerEl.focus();
          return;
        }
        recordUserInputAnswer(choice.value);
      });
      optionsEl.appendChild(button);
    }
    optionsField.hidden = false;
    answerField.hidden = true;
    submitBtn.hidden = true;
  } else {
    optionsField.hidden = true;
    answerField.hidden = false;
    submitBtn.hidden = false;
    setTimeout(() => answerEl.focus(), 0);
  }
}

function recordUserInputAnswer(answer) {
  if (!state.userInputPending) return;
  const pending = state.userInputPending;
  const item = pending.items[pending.index] || {};
  pending.answers.push({
    question: item.question || '',
    answer: String(answer || '').trim(),
  });
  pending.index++;
  if (pending.index < pending.items.length) {
    renderUserInputStep();
    return;
  }
  sendUserInputAnswer(formatUserInputAnswers(pending.answers));
}

function formatUserInputAnswers(answers) {
  if (answers.length === 1) return answers[0].answer;
  return answers
    .map((item, index) => `问题 ${index + 1}：${item.question}\n回答：${item.answer}`)
    .join('\n\n');
}

function sendUserInputAnswer(answer) {
  if (!state.userInputPending) return;
  state.ws.send(JSON.stringify({
    type: 'user_input',
    request_id: state.userInputPending.request_id,
    answer,
    canceled: false,
  }));
  closeUserInputModal();
}

document.getElementById('btn-user-submit').addEventListener('click', () => {
  if (!state.userInputPending) return;
  const answer = document.getElementById('user-input-answer').value.trim();
  recordUserInputAnswer(answer);
});

document.getElementById('btn-user-cancel').addEventListener('click', () => {
  if (state.userInputPending) {
    state.ws.send(JSON.stringify({
      type: 'user_input',
      request_id: state.userInputPending.request_id,
      answer: '',
      canceled: true,
    }));
  }
  closeUserInputModal();
});

document.addEventListener('keydown', (e) => {
  if (!modal.classList.contains('open')) return;
  if (e.key === 'y' || e.key === 'Y') { document.getElementById('btn-approve').click(); e.preventDefault(); }
  if (e.key === 'n' || e.key === 'N' || e.key === 'Escape') { document.getElementById('btn-reject').click(); e.preventDefault(); }
});
document.addEventListener('keydown', (e) => {
  if (!userInputModal.classList.contains('open')) return;
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    document.getElementById('btn-user-submit').click();
    e.preventDefault();
  }
  if (e.key === 'Escape') {
    document.getElementById('btn-user-cancel').click();
    e.preventDefault();
  }
});

// ── Input & Keyboard ────────────────────────────────────────────────────
taskInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitTask(); }
});
sendBtn.addEventListener('click', submitTask);
const newSessionBtn = document.getElementById('new-session-btn');
if (newSessionBtn) newSessionBtn.addEventListener('click', beginNewSession);
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'l') { e.preventDefault(); clearConversation(); }
});

function submitTask() {
  const task = taskInput.value.trim();
  if (!task || !state.connected || state.running) return;
  taskInput.value = '';
  sendRun(task);
}

function clearConversation(options = {}) {
  const { showEmpty = true } = options;
  eventsEl.querySelectorAll('.turn-group').forEach(el => el.remove());
  eventsEl.querySelectorAll('.session-separator,.history-turn,.history-workflow-card').forEach(el => el.remove());
  if (emptyState && emptyState.parentNode) emptyState.remove();
  if (showEmpty && !eventsEl.querySelector('.turn-group')) {
    eventsEl.appendChild(emptyState);
  }
  document.getElementById('log-entries').innerHTML = '';
  state.filePreviews = [];
  updateFilePreview();
}

// ── Init ────────────────────────────────────────────────────────────────
connect();
loadSessions();

// 监听父页面的策略上下文切换
window.addEventListener('message', (event) => {
  if (event.origin !== window.location.origin) return;
  const msg = event.data;
  if (msg?.type === 'set-strategy' && msg.strategyName) {
    // 将策略名称设置为当前任务上下文
    taskInput.placeholder = '针对「' + msg.strategyName + '」输入策略需求…';
    // 可选：自动填充预设提示词
  }
});
</script>
